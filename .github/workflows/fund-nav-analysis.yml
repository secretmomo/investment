name: 基金净值分析

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      reason:
        description: "触发原因（可选）"
        required: false
        type: string
        default: "Github Actions 页面手动触发" # UTC 00:00，对应北京时间 08:00，每月1日

env:
  WORKFLOW_NAME: ${{ github.workflow }}
  RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
  LARK_CHAT_ID: ${{ secrets.LARK_TEST_CHAT_ID }}
  LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
  LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}

jobs:
  sync:
    name: 同步基金净值分析
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: 同步基金净值分析
        working-directory: src/modules/fund-nav-analysis
        run: bun run index.ts
